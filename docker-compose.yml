version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: notesdb
      POSTGRES_USER: notesuser
      POSTGRES_PASSWORD: notespass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://notesuser:notespass@db:5432/notesdb
      SECRET_KEY: change-me-at-least-32-chars-change-me-at-least-32-chars
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      ABOUT_NAME: Your Name
      ABOUT_EMAIL: your@email.com
    ports:
      - "8001:8001"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
